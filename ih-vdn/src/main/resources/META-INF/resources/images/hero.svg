<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480" role="img" aria-label="Car protected by an insurance shield">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfdbfe"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="480" fill="url(#sky)"/>
  <circle cx="520" cy="120" r="70" fill="#fbbf24" opacity="0.85"/>

  <!-- shield halo behind the car -->
  <g filter="url(#soft)">
    <path d="M320 70 L470 120 V250 C470 330 405 380 320 410 C235 380 170 330 170 250 V120 Z"
          fill="url(#shield)"/>
    <path d="M320 70 L470 120 V250 C470 330 405 380 320 410 C235 380 170 330 170 250 V120 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"/>
    <!-- checkmark -->
    <path d="M268 240 L308 282 L386 188" fill="none" stroke="#ffffff" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- car -->
  <g filter="url(#soft)" transform="translate(0,18)">
    <!-- body -->
    <path d="M150 360
             C150 345 162 338 178 336
             L226 300
             C238 290 252 285 268 285
             L372 285
             C392 285 410 293 424 308
             L460 338
             C478 342 490 350 490 362
             L490 386
             C490 394 484 400 476 400
             L164 400
             C156 400 150 394 150 386 Z"
          fill="url(#body)"/>
    <!-- windows -->
    <path d="M252 296 L356 296 C372 296 386 302 396 314 L410 332 L252 332 Z" fill="url(#glass)"/>
    <path d="M244 332 L244 300 C244 297 247 296 250 296 L246 296 L246 332 Z" fill="url(#glass)"/>
    <rect x="316" y="296" width="6" height="36" fill="url(#body)"/>
    <!-- door line -->
    <path d="M300 336 L300 392" stroke="#1e3a8a" stroke-width="3" opacity="0.5"/>
    <!-- headlight -->
    <rect x="478" y="350" width="14" height="12" rx="4" fill="#fde68a"/>
  </g>

  <!-- wheels -->
  <g transform="translate(0,18)">
    <circle cx="232" cy="402" r="34" fill="#0f172a"/>
    <circle cx="232" cy="402" r="15" fill="#cbd5e1"/>
    <circle cx="412" cy="402" r="34" fill="#0f172a"/>
    <circle cx="412" cy="402" r="15" fill="#cbd5e1"/>
  </g>

  <!-- ground -->
  <rect x="0" y="438" width="640" height="6" rx="3" fill="#cbd5e1"/>
</svg>
