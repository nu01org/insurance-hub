# Dev profile: run Flyway migrations automatically on startup.
quarkus.flyway.migrate-at-start=true

# Datasource pointing at the local PostgreSQL started by process-compose.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/insurancehub
